<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEO MODZ AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

  <div class="bg-gray-800 rounded-2xl shadow-xl p-6 max-w-lg w-full">
    <h1 class="text-2xl font-bold mb-4 text-center text-yellow-400">LEO MODZ AI</h1>

    <!-- Chat Container -->
    <div id="chat" class="h-80 overflow-y-auto mb-4 border border-gray-700 rounded-lg p-4 bg-gray-900">
      <!-- Mensagens aparecerão aqui -->
    </div>

    <!-- Input -->
    <div class="flex gap-2">
      <input id="message" type="text" placeholder="Digite sua mensagem..." 
        class="flex-1 p-3 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <button id="sendBtn" class="bg-yellow-400 text-gray-900 font-bold px-4 rounded-lg hover:bg-yellow-300 transition">
        Enviar
      </button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('sendBtn');

    const LOCAL_KEY = "LEOMODZDEV"; // mesma chave do Flask

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = sender === 'user' ? 'text-right mb-2' : 'text-left mb-2';
      div.innerHTML = `<span class="inline-block px-4 py-2 rounded-xl ${sender==='user'?'bg-yellow-400 text-gray-900':'bg-gray-700'}">${text}</span>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      messageInput.value = '';

      try {
        const response = await fetch(`/ask?message=${encodeURIComponent(message)}&key=${LOCAL_KEY}`);
        const data = await response.json();

        if (data.reply) {
          // Remove bloco <think> se existir
          const cleanReply = data.reply.includes("</think>") ? data.reply.split("</think>").pop().trim() : data.reply;
          appendMessage('bot', cleanReply);
        } else if (data.error) {
          appendMessage('bot', "Erro: " + data.error);
        }
      } catch (err) {
        appendMessage('bot', "Erro na comunicação com o servidor.");
        console.error(err);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
